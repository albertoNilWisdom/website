<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trobson</title>
  <link rel="shortcut icon" href="tedicon.png">

 <style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background-color: #222129;
    color: #447886;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    box-sizing: border-box;
    margin: 0;
    padding-top: 48px; /* Default desktop padding */
    overflow: hidden;
  }

  /* Responsive padding for smaller screens */
  @media (max-width: 600px) {
    body {
      padding-top: 24px;
    }
  }

  @media (max-width: 360px) {
    body {
      padding-top: 16px;
    }
  }

  pre {
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.2;
    text-align: center;
    user-select: none;
    margin: 0;
  }

  .cursor {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 8px;
    background-color: #222129;
    z-index: 10;
  }

    .link-list {
      margin-top: 20px;
      font-size: 18px;
      text-align: left;
      max-width: 100%;
      word-break: break-word;
      white-space: pre-wrap;

    }

    .link-line {
      display: block;
      color: #7db9c2;
      text-decoration: none;
      line-height: 1.8;
    }

    .link-line:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <pre id="console"></pre><div class="cursor"></div>
  <div id="linkContainer" class="link-list"></div>

  <script>
    const consoleEl = document.getElementById('console');
    const linkContainer = document.getElementById('linkContainer');

    let index = 0;
    let titleText = '';

    const titleUrl = 'https://raw.githubusercontent.com/albertoNilWisdom/info/refs/heads/main/title.txt';
    const linksUrl = 'https://raw.githubusercontent.com/albertoNilWisdom/info/refs/heads/main/links.md';

    function typeTitle(callback) {
      if (index < titleText.length) {
        consoleEl.textContent += titleText.charAt(index);
        index++;
        setTimeout(() => typeTitle(callback), 10);
      } else {
        callback();
      }
    }

    function loadTitleAndLinks() {
      fetch(titleUrl)
        .then(res => {
          if (!res.ok) throw new Error("Failed to load title");
          return res.text();
        })
        .then(text => {
          titleText = text;
          typeTitle(loadMarkdownLinks);
        })
        .catch(err => {
          consoleEl.textContent = "[Error loading title]";
          console.error(err);
        });
    }

    function typeLinkLine(text, url, delay, callback) {
      const span = document.createElement('span');
      span.className = 'link-line';
      linkContainer.appendChild(span);

      let charIndex = 0;
      function typeChar() {
        if (charIndex < text.length) {
          span.textContent += text.charAt(charIndex);
          charIndex++;
          setTimeout(typeChar, 10);
        } else {
          const link = document.createElement('a');
          link.href = url;
          link.textContent = text;
          link.className = 'link-line';
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          linkContainer.replaceChild(link, span);
          callback();
        }
      }
      setTimeout(typeChar, delay);
    }

    function loadMarkdownLinks() {
      fetch(linksUrl)
        .then(response => {
          if (!response.ok) throw new Error("Failed to load links");
          return response.text();
        })
        .then(markdown => {
          const lines = markdown.split('\n');
          const linkRegex = /^[-*+] \[(.*?)\]\((.*?)\)/;

          const parsedLinks = lines
            .map(line => {
              const match = linkRegex.exec(line.trim());
              return match ? { text: '\u2022 ' + match[1], url: match[2] } : null;
            })
            .filter(Boolean);

          if (parsedLinks.length === 0) {
            linkContainer.textContent = "[No links found in markdown]";
            return;
          }

          let i = 0;
          function typeNextLink() {
            if (i < parsedLinks.length) {
              const { text, url } = parsedLinks[i];
              i++;
              typeLinkLine(text, url, 0, typeNextLink);
            }
          }

          typeNextLink();
        })
        .catch(error => {
          linkContainer.textContent = "[Error loading markdown]";
          console.error("Fetch error:", error);
        });
    }

    // Start the sequence
    loadTitleAndLinks();
  </script>
</body>
</html>
