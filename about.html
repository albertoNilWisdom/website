<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trobson</title>
  <link rel="shortcut icon" href="tedicon.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background-color: #222129;
      color: #447886;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      box-sizing: border-box;
      margin: 0;
      padding-top: 48px;               /* Default desktop padding */
      overflow: hidden;
    }

    @media (max-width: 600px) {
      body { padding-top: 24px; }
    }
    @media (max-width: 360px) {
      body { padding-top: 16px; }
    }

    pre {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.2;
      text-align: center;
      user-select: none;
      margin: 0;
    }

    .cursor {
      position: fixed;
      top: 0; left: 0; right: 0;
      text-align: center;
      padding: 8px;
      background-color: #222129;
      z-index: 10;
    }

    .scroll-wrapper {
      display: flex;
      flex: 1;
      width: 100%;
      overflow: hidden;
    }

    .content-area {
      flex: 1;
      overflow-y: scroll;
      padding: 16px;
      font-size: 14px;
      text-align: left;
      white-space: pre-wrap;          /* keep line‑breaks for the typewriter */
      word-break: break-word;
      scrollbar-width: none;          /* Firefox */
    }
    .content-area::-webkit-scrollbar { width:0 }

    .ascii-scrollbar {
      width: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      font-size: 14px;
      padding-top: 4px;
    }
    .ascii-thumb { color:#447886; }

    /* ---- Markdown styling ------ */
    .content-area h1,
    .content-area h2,
    .content-area h3 {
      margin: 0.8em 0 0.4em;
      line-height: 1.2;
    }
    .content-area p { margin: 0.6em 0; }
    .content-area ul,
    .content-area ol {
      margin: 0.4em 0 0.4em 1.5em;
      padding-left: 0;
    }
    .content-area li { margin: 0.2em 0; }
  </style>
</head>

<body>
  <pre id="console"></pre>
  <div class="cursor"></div>

  <div class="scroll-wrapper">
    <div id="contentArea" class="content-area"></div>
    <div class="ascii-scrollbar" id="asciiScrollbar"></div>
  </div>

  <script>
    const consoleEl   = document.getElementById('console');
    const contentArea = document.getElementById('contentArea');
    const scrollbar   = document.getElementById('asciiScrollbar');

    let idx = 0;
    let titleText = '';

    const titleUrl   = 'https://raw.githubusercontent.com/albertoNilWisdom/info/refs/heads/main/title.txt';
    const contentUrl = 'https://raw.githubusercontent.com/albertoNilWisdom/info/refs/heads/main/about.md';


    function typeTitle(cb) {
      if (idx < titleText.length) {
        const displayed = titleText.substring(0, idx + 1);
        consoleEl.innerHTML =
          `<a href="https://trobson.me" style="color:inherit;text-decoration:none;cursor:pointer;">${displayed}</a>`;
        idx++;
        setTimeout(() => typeTitle(cb), 10);
      } else {
        cb();
      }
    }


    function loadTitleAndContent() {
      fetch(titleUrl)
        .then(r => r.ok ? r.text() : Promise.reject('title fetch error'))
        .then(t => { titleText = t; typeTitle(loadTextContent); })
        .catch(e => { consoleEl.textContent='[Error loading title]'; console.error(e); });
    }

    function loadTextContent() {
      fetch(contentUrl)
        .then(r => r.ok ? r.text() : Promise.reject('content fetch error'))
        .then(md => typeContent(md))
        .catch(e => { contentArea.textContent='[Error loading content]'; console.error(e); });
    }


    function typeContent(md) {
      let i = 0;
      const rawBuffer = [];

      function step() {
        if (i < md.length) {
          const ch = md.charAt(i);
          rawBuffer.push(ch);
          contentArea.textContent = rawBuffer.join('');
          i++;
          updateAsciiScrollbar();
          setTimeout(step, 0);
        } else {
          // All characters typed – now turn the raw markdown into HTML
          const html = parseMarkdown(rawBuffer.join(''));
          contentArea.innerHTML = html;
          // Re‑run scrollbar calculation because innerHTML may change height
          updateAsciiScrollbar();
        }
      }
      step();
    }


    function parseMarkdown(md) {
      const lines = md.split('\n');

      let html   = '';
      let inList = false;          // true when inside a <ul> or <ol>
      let listTag = '';            // 'ul' or 'ol'

      const flushList = () => {
        if (inList) { html += `</${listTag}>`; inList = false; listTag=''; }
      };

      for (let raw of lines) {
        const line = raw.trimEnd();   // keep leading spaces for list detection

        // ----- Headings --
        if (/^#{1,3}\s/.test(line)) {
          flushList();
          const level = line.match(/^#+/)[0].length;
          const text  = line.replace(/^#+\s*/, '');
          html += `<h${level}>${escapeHtml(text)}</h${level}>`;
          continue;
        }

        // ----- Ordered list --
        if (/^\d+\.\s/.test(line)) {
          const item = line.replace(/^\d+\.\s/, '');
          if (!inList || listTag !== 'ol') { flushList(); html += '<ol>'; inList=true; listTag='ol'; }
          html += `<li>${escapeHtml(item)}</li>`;
          continue;
        }

        // ----- Unordered list --
        if (/^[-*]\s/.test(line)) {
          const item = line.replace(/^[-*]\s/, '');
          if (!inList || listTag !== 'ul') { flushList(); html += '<ul>'; inList=true; listTag='ul'; }
          html += `<li>${escapeHtml(item)}</li>`;
          continue;
        }

        // ----- Blank line → paragraph break --
        if (/^\s*$/.test(line)) {
          flushList();
          // Two consecutive blank lines will just produce an empty <p>
          html += '<p></p>';
          continue;
        }

        // ----- Regular paragraph -
        flushList();
        html += `<p>${escapeHtml(line)}</p>`;
      }
      flushList();

      return html;
    }

    function escapeHtml(str) {
      const map = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
      return str.replace(/[&<>"']/g, m => map[m]);
    }

    function updateAsciiScrollbar() {
      const visibleRatio = contentArea.clientHeight / contentArea.scrollHeight;
      const scrollRatio  = contentArea.scrollTop /
                           (contentArea.scrollHeight - contentArea.clientHeight);

      const totalLines   = Math.floor(contentArea.clientHeight / 14); // approx line‑height
      const thumbSize    = Math.max(1, Math.floor(totalLines * visibleRatio * 0.175));
      const thumbPos     = Math.floor((totalLines - thumbSize) * scrollRatio);

      let lines = new Array(totalLines).fill('|');
      for (let i=0;i<thumbSize;i++) lines[thumbPos+i] = '#';

      scrollbar.innerHTML = lines.map(c=>`<div class="ascii-thumb">${c}</div>`).join('');
    }

    contentArea.addEventListener('scroll', updateAsciiScrollbar);
    window.addEventListener('resize', updateAsciiScrollbar);

    loadTitleAndContent();
  </script>
</body>
</html>
